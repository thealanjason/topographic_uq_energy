[agent]
interval = "100ms"

[plugins.influxdb]
enabled = false

[plugins.prometheus-exporter]
enabled = false

# --- 1. HARDWARE SENSORS ---
[plugins.nvml]
enabled = true
poll_interval = "100ms"
flush_interval = "100ms"
mode = "full"

[plugins.rapl]
enabled = true
poll_interval = "100ms"
flush_interval = "100ms"
no_perf_events = false

# --- 2. PROCESS MONITOR ---
[plugins.procfs]

[plugins.procfs.kernel]
enabled = false
poll_interval = "100ms"

[plugins.procfs.memory]
enabled = false
poll_interval = "100ms"
metrics = [
    "MemTotal",
    "MemFree",
    "MemAvailable",
    "Cached",
    "SwapCached",
    "Active",
    "Inactive",
    "Mapped",
]

[plugins.procfs.network]
enabled = false
poll_interval = "100ms"

[plugins.procfs.processes]
enabled = true
strategy = "event"
refresh_interval = "100ms"

[[plugins.procfs.processes.groups]]
exe_regex = ""
poll_interval = "100ms"
flush_interval = "100ms"
memory_mode = "quick"

[plugins.procfs.processes.events]
poll_interval = "100ms"
flush_interval = "100ms"
memory_mode = "quick"

# --- 3. THE MATH ENGINE (ENERGY ATTRIBUTION) ---
[plugins.energy-attribution]
enabled = true

# CPU Energy Attribution
[plugins.energy-attribution.formulas.attributed_energy_cpu]
expr = "cpu_energy * (cpu_usage / 100.0)"
ref = "cpu_energy"
retention_time = "2s"

[plugins.energy-attribution.formulas.attributed_energy_cpu.per_resource]
cpu_energy = { metric = "rapl_consumed_energy", resource_kind = "local_machine", domain = "package_total" }

[plugins.energy-attribution.formulas.attributed_energy_cpu.per_consumer]
cpu_usage = { metric = "cpu_percent", kind = "total" }

# GPU Energy Attribution (Updated for True Energy Odometer)
[plugins.energy-attribution.formulas.attributed_energy_gpu]
expr = "(total_energy / 1000.0) * (process_util / 100.0)"
ref = "total_energy"
retention_time = "2s"

[plugins.energy-attribution.formulas.attributed_energy_gpu.per_resource]
total_energy = { metric = "nvml_energy_consumption", resource_kind = "gpu" }

[plugins.energy-attribution.formulas.attributed_energy_gpu.per_consumer]
process_util = { metric = "nvml_sm_utilization" }

# --- 4. THE OUTPUT ---
[plugins.csv]
enabled = true
output_path = "alumet-gpu-test.csv"
force_flush = false
append_unit_to_metric_name = true
use_unit_display_name = true
csv_delimiter = ";"
csv_late_delimiter = ","